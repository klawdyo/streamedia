name: CI

# CI TEMPORARIAMENTE DESATIVADO durante o desenvolvimento: rodar vet+test+build
# a cada push estava deixando o ciclo de deploy lento. Por enquanto o workflow
# só roda manualmente (aba Actions > CI > "Run workflow"). Para REATIVAR o CI
# automático, basta descomentar os gatilhos `push` e `pull_request` abaixo.
on:
  workflow_dispatch:
  # push:
  # pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -coverprofile=coverage.out -covermode=atomic

      - name: Build
        run: CGO_ENABLED=0 go build ./cmd/server

