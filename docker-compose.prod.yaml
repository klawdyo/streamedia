# Compose de PRODUÇÃO — imagem multi-stage otimizada.
#
# Usado pelo Coolify (configure o deploy para usar este arquivo).
# NÃO publica portas no host: o proxy reverso (Traefik) roteia via rede
# interna do Docker usando a porta exposta pela imagem (EXPOSE 3000).

services:
  streamedia:
    build:
      context: .
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    restart: unless-stopped
    environment:
      - ENV=${ENV:-production}
      - ROOT_TOKEN=${ROOT_TOKEN}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SQLITE_PATH=${SQLITE_PATH:-/data/media.db}
      - PORT=${PORT:-3000}
    volumes:
      # BIND MOUNTS com caminhos absolutos: aparecem na aba Persistent Storage
      # do Coolify e são browsáveis no host. A ownership é corrigida pelo
      # docker-entrypoint.sh (root → chown → su-exec appuser).
      - /data/coolify/streamedia/media:/media
      - /data/coolify/streamedia/data:/data
    expose:
      - "${PORT:-3000}"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
