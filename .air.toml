# Air — hot reload para desenvolvimento local dentro do Docker
# https://github.com/air-verse/air
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # Binário gerado pelo build (ficará dentro do container)
  cmd = "go build -o /tmp/server ./cmd/server"
  bin = "/tmp/server"
  # Timeout generoso para builds incrementais
  delay = 500
  stop_signal = "SIGINT"
  # Mata o processo anterior antes de iniciar o novo
  kill_delay = "1s"
  # Exclui diretórios que não são código-fonte Go
  exclude_dir = ["tmp", "data", "media", "web", "testdata", ".git", ".worktrees", ".tasks", ".agents", ".claude"]
  # Só observa mudanças nestas extensões
  include_ext = ["go", "mod", "sum"]
  # Rebuild quando go.mod ou go.sum mudarem
  include_file = ["go.mod", "go.sum"]
  # Exclui arquivos de teste do disparo de rebuild (mas ainda compila)
  exclude_file = ["_test.go"]
  # Log limpo no terminal
  log = "build-errors.log"
  full_bin = ""

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  app = ""

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = true
