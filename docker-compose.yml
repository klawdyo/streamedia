services:
  mediaserver:
    build:
      context: .
      args:
        # Commit do git para a versão exibida no /version. Opcional — fica
        # "unknown" quando GIT_COMMIT não é fornecido (ex.: build no Coolify).
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    restart: unless-stopped
    environment:
      # Token raiz (admin) para autenticação via header Authorization.
      - ROOT_TOKEN=${ROOT_TOKEN}
      # Ambiente de execução exposto em GET /api. Em produção defina ENV=production
      # (no .env / nas variáveis do Coolify); o default é "development".
      - ENV=${ENV:-development}
      # Webhook de notificação (ex.: n8n) chamado ao concluir uma transcodificação.
      - WEBHOOK_URL=${WEBHOOK_URL}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}

      # -- Google OAuth2 (admin unificado) --
      # Credenciais do OAuth2 do Google para login no painel de admin.
      # Obtidas em https://console.cloud.google.com/apis/credentials.
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      # URL de callback registrada no Google — deve ser a URL pública do serviço
      # seguida de /api/oauth/google/callback (ex.: https://stream.example.com/api/oauth/google/callback).
      - GOOGLE_REDIRECT_URL=${GOOGLE_REDIRECT_URL}

      # -- SPA (admin unificado) --
      # Caminho no container onde o bundle compilado do Vue.js está.
      # O servidor serve /admin/* a partir deste diretório.
      - SPA_DIR=${SPA_DIR:-/app/web/dist}

      # -- Storage --
      - MEDIA_DIR=${MEDIA_DIR:-/media}
      - UPLOAD_TMP_DIR=${UPLOAD_TMP_DIR:-/media/.uploads}
      - SQLITE_PATH=${SQLITE_PATH:-/data/media.db}

      # Porta HTTP do servidor.
      - PORT=${PORT:-3000}

      # As demais configurações (MAX_UPLOAD_SIZE_MB, QUEUE_MAX_SIZE,
      # TRANSCODE_WORKERS, UPLOAD_TOKEN_TTL, PLAY_TOKEN_TTL, UPLOAD_IDLE_TIMEOUT,
      # TRANSCODE_STUCK, MAX_TRANSCODE_ATTEMPTS, KEEP_ORIGINAL, RATE_LIMIT_PER_MIN)
      # agora são gerenciadas via banco de dados pelo painel de admin unificado.
      # O servidor carrega esses valores da tabela de configurações em runtime;
      # não precisam mais ser passadas como variáveis de ambiente.
    volumes:
      # BIND MOUNTS para caminhos absolutos do host: assim o storage aparece
      # como um DIRETÓRIO VISÍVEL na aba de Persistent Storage do Coolify (e é
      # browsável/inspecionável no host), em vez de um volume nomeado opaco
      # escondido em /var/lib/docker/volumes.
      #
      # A permissão é resolvida pelo docker-entrypoint.sh: o container sobe como
      # root, faz chown destes diretórios para appuser e então baixa o
      # privilégio via su-exec. Sem isso, o bind mount nasceria como root e o
      # SQLite falharia (error 14).
      - /data/coolify/streamedia/media:/media
      - /data/coolify/streamedia/data:/data
    # SEM `ports:` em produção (segurança): não publicamos a porta da app no
    # host. O proxy reverso do Coolify (Traefik) alcança o container pela rede
    # interna do Docker — ele lê a porta exposta pela imagem (EXPOSE 3000 no
    # Dockerfile) e roteia o tráfego de 80/443 (com TLS) para cá. Publicar
    # "3000:3000" abriria 0.0.0.0:3000 no IP público do host, que é exatamente
    # onde scanners/bots batem direto, contornando o proxy, o TLS e o domínio.
    # Em desenvolvimento, o docker-compose.override.yml republica a porta em
    # 127.0.0.1 para acesso local.
    expose:
      - "${PORT:-3000}"
    healthcheck:
      # Usa GET (-O /dev/null), não HEAD (--spider): a app responde 200 em GET
      # /healthz. Um HEAD retornaria 405 e marcaria o container como unhealthy,
      # fazendo o proxy do Coolify deixar de rotear o tráfego para ele.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

# Sem bloco `volumes:` nomeados: a persistência agora é feita por BIND MOUNTS
# para caminhos absolutos do host (ver `volumes:` do serviço acima), para que os
# diretórios apareçam na aba de Persistent Storage do Coolify. A ownership é
# tratada em runtime pelo docker-entrypoint.sh (root → chown → su-exec appuser).
