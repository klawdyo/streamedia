services:
  mediaserver:
    build:
      context: .
      args:
        # Commit do git para a versĂŁo exibida no /version. Opcional â€” fica
        # "unknown" quando GIT_COMMIT nĂŁo Ă© fornecido (ex.: build no Coolify).
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    restart: unless-stopped
    environment:
      - UPLOAD_TOKEN_SECRET=${UPLOAD_TOKEN_SECRET}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-10}
      - MEDIA_DIR=${MEDIA_DIR:-/media}
      - UPLOAD_TMP_DIR=${UPLOAD_TMP_DIR:-/media/.uploads}
      - SQLITE_PATH=${SQLITE_PATH:-/data/media.db}
      - QUEUE_MAX_SIZE=${QUEUE_MAX_SIZE:-50}
      - TRANSCODE_WORKERS=${TRANSCODE_WORKERS:-1}
      - UPLOAD_TOKEN_TTL_SECONDS=${UPLOAD_TOKEN_TTL_SECONDS:-1200}
      - PLAY_TOKEN_MAX_TTL_SECONDS=${PLAY_TOKEN_MAX_TTL_SECONDS:-21600}
      - UPLOAD_IDLE_TIMEOUT_SECONDS=${UPLOAD_IDLE_TIMEOUT_SECONDS:-600}
      - TRANSCODE_STUCK_SECONDS=${TRANSCODE_STUCK_SECONDS:-1800}
      - MAX_TRANSCODE_ATTEMPTS=${MAX_TRANSCODE_ATTEMPTS:-3}
      - KEEP_ORIGINAL=${KEEP_ORIGINAL:-false}
      - PORT=${PORT:-3000}
      - RATE_LIMIT_PER_MIN=${RATE_LIMIT_PER_MIN:-60}
    volumes:
      # Volumes nomeados (nĂŁo bind mounts): o Docker inicializa o ponto de
      # montagem herdando a ownership do diretĂłrio na imagem (appuser:appuser),
      # entĂŁo o processo nĂŁo-root consegue escrever. Bind mounts do host
      # (./data) seriam criados como root e quebrariam o SQLite (erro 14).
      - media:/media
      - data:/data
    # SEM `ports:` em produĂ§ĂŁo (seguranĂ§a): nĂŁo publicamos a porta da app no
    # host. O proxy reverso do Coolify (Traefik) alcanĂ§a o container pela rede
    # interna do Docker â€” ele lĂŞ a porta exposta pela imagem (EXPOSE 3000 no
    # Dockerfile) e roteia o trĂˇfego de 80/443 (com TLS) para cĂˇ. Publicar
    # "3000:3000" abriria 0.0.0.0:3000 no IP pĂşblico do host, que Ă© exatamente
    # onde scanners/bots batem direto, contornando o proxy, o TLS e o domĂ­nio.
    # Em desenvolvimento, o docker-compose.override.yml republica a porta em
    # 127.0.0.1 para acesso local.
    expose:
      - "3000"
    healthcheck:
      # Usa GET (-O /dev/null), nĂŁo HEAD (--spider): a app responde 200 em GET
      # /healthz. Um HEAD retornaria 405 e marcaria o container como unhealthy,
      # fazendo o proxy do Coolify deixar de rotear o trĂˇfego para ele.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

# Volumes nomeados persistentes â€” gerenciados pelo Docker/Coolify, sobrevivem
# a recriaĂ§Ăµes do container e preservam a ownership nĂŁo-root da imagem.
volumes:
  media:
  data:
