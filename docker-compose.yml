services:
  mediaserver:
    build:
      context: .
      args:
        # Commit do git para a versão exibida no /version. Opcional — fica
        # "unknown" quando GIT_COMMIT não é fornecido (ex.: build no Coolify).
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    restart: unless-stopped
    environment:
      - UPLOAD_TOKEN_SECRET=${UPLOAD_TOKEN_SECRET}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-10}
      - MEDIA_DIR=${MEDIA_DIR:-/media}
      - UPLOAD_TMP_DIR=${UPLOAD_TMP_DIR:-/media/.uploads}
      - SQLITE_PATH=${SQLITE_PATH:-/data/media.db}
      - QUEUE_MAX_SIZE=${QUEUE_MAX_SIZE:-50}
      - TRANSCODE_WORKERS=${TRANSCODE_WORKERS:-1}
      - UPLOAD_TOKEN_TTL_SECONDS=${UPLOAD_TOKEN_TTL_SECONDS:-1200}
      - PLAY_TOKEN_MAX_TTL_SECONDS=${PLAY_TOKEN_MAX_TTL_SECONDS:-21600}
      - UPLOAD_IDLE_TIMEOUT_SECONDS=${UPLOAD_IDLE_TIMEOUT_SECONDS:-600}
      - TRANSCODE_STUCK_SECONDS=${TRANSCODE_STUCK_SECONDS:-1800}
      - MAX_TRANSCODE_ATTEMPTS=${MAX_TRANSCODE_ATTEMPTS:-3}
      - KEEP_ORIGINAL=${KEEP_ORIGINAL:-false}
      - PORT=${PORT:-3000}
      - RATE_LIMIT_PER_MIN=${RATE_LIMIT_PER_MIN:-60}
    volumes:
      - ./media:/media
      - ./data:/data
    ports:
      - "${PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
