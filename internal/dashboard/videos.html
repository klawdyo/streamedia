<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Streamedia — Vídeos</title>
<link rel="stylesheet" href="/dashboard/assets/theme.css">
<script src="/dashboard/assets/app.js"></script>
</head>
<body>
<header class="top">
  <h1>Streamedia</h1>
  <span class="tagline">Dashboard — biblioteca de vídeos</span>
  <nav>
    <a href="/dashboard">Visão geral</a>
    <a href="/dashboard/videos">Vídeos</a>
    <a href="/playground">Playground</a>
    <a href="/docs">Docs</a>
  </nav>
</header>

<div class="wrap">
  <div class="tokenbar">
    <label for="rootToken">ROOT_TOKEN</label>
    <input type="password" id="rootToken" placeholder="root-token-...">
    <button id="saveToken">Carregar</button>
  </div>
  <div id="tokenStatus" class="note"></div>

  <div id="content" class="hidden">
    <div class="panel">
      <!-- Filtros e ordenação -->
      <div class="controls">
        <label>Status
          <select id="fStatus">
            <option value="">Todos</option>
            <option value="ready">Pronto</option>
            <option value="transcoding">Processando</option>
            <option value="upload_complete">Upload concluído</option>
            <option value="uploading">Enviando</option>
            <option value="pending_upload">Aguardando upload</option>
            <option value="failed_transcode">Falha no processamento</option>
            <option value="failed_upload">Falha no upload</option>
          </select>
        </label>
        <label>Tag
          <input type="text" id="fTag" placeholder="default">
        </label>
        <label>Ordenar por
          <select id="fSort">
            <option value="created_at">Data de envio</option>
            <option value="updated_at">Última atualização</option>
            <option value="status">Status</option>
            <option value="actual_size_bytes">Tamanho</option>
            <option value="duration_s">Duração</option>
          </select>
        </label>
        <label>Direção
          <select id="fOrder">
            <option value="desc">Decrescente</option>
            <option value="asc">Crescente</option>
          </select>
        </label>
        <label>Por página
          <select id="fLimit">
            <option value="25">25</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
            <option value="200">200</option>
          </select>
        </label>
        <button id="apply">Aplicar</button>
      </div>

      <table>
        <thead><tr><th></th><th>Vídeo</th><th>Status</th><th>Tag</th><th class="num">Duração</th><th class="num">Tamanho</th><th>Enviado em</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>

      <div class="pager">
        <button class="ghost small" id="prev">← Anterior</button>
        <span id="pageInfo">—</span>
        <button class="ghost small" id="next">Próxima →</button>
      </div>
    </div>
  </div>

  <div id="error" class="note err hidden"></div>
</div>

<script>
(function () {
  var D = window.Dash;

  // Estado da listagem, inicializado a partir da query string para que a URL
  // seja compartilhável/recarregável.
  var state = {
    status: D.qs("status", ""),
    tag: D.qs("tag", ""),
    sort: D.qs("sort", "created_at"),
    order: D.qs("order", "desc"),
    limit: parseInt(D.qs("limit", "50"), 10) || 50,
    offset: parseInt(D.qs("offset", "0"), 10) || 0,
    total: 0,
  };

  function showError(msg) {
    var e = document.getElementById("error");
    e.textContent = msg;
    e.classList.remove("hidden");
  }
  function hideError() { document.getElementById("error").classList.add("hidden"); }

  function syncControls() {
    document.getElementById("fStatus").value = state.status;
    document.getElementById("fTag").value = state.tag;
    document.getElementById("fSort").value = state.sort;
    document.getElementById("fOrder").value = state.order;
    document.getElementById("fLimit").value = String(state.limit);
  }

  function readControls() {
    state.status = document.getElementById("fStatus").value;
    state.tag = document.getElementById("fTag").value.trim();
    state.sort = document.getElementById("fSort").value;
    state.order = document.getElementById("fOrder").value;
    state.limit = parseInt(document.getElementById("fLimit").value, 10) || 50;
    state.offset = 0; // novo filtro/ordenação volta para a 1ª página
  }

  function buildQuery() {
    var p = new URLSearchParams();
    if (state.status) p.set("status", state.status);
    if (state.tag) p.set("tag", state.tag);
    p.set("sort", state.sort);
    p.set("order", state.order);
    p.set("limit", String(state.limit));
    p.set("offset", String(state.offset));
    return p.toString();
  }

  function thumbURL(v) {
    var res = (v.Resolutions || []).slice().sort(function (a, b) { return a - b; });
    if (!res.length) return "";
    return "/video/" + encodeURIComponent(v.Tag) + "/" + encodeURIComponent(v.VideoID) + "/thumb_" + res[0] + ".jpg";
  }

  function renderRows(videos) {
    var rows = videos.map(function (v) {
      var t = thumbURL(v);
      var thumb = t ? '<img class="thumb" src="' + t + '" alt="" loading="lazy">' : '<div class="thumb"></div>';
      var link = "/dashboard/videos/" + encodeURIComponent(v.VideoID);
      return '<tr>' +
        '<td><a href="' + link + '">' + thumb + '</a></td>' +
        '<td><a href="' + link + '" class="mono-id">' + D.escapeHtml(v.VideoID) + '</a></td>' +
        '<td><span class="chip ' + D.escapeHtml(v.Status) + '">' + D.escapeHtml(D.statusLabel(v.Status)) + '</span></td>' +
        '<td>' + D.escapeHtml(v.Tag) + '</td>' +
        '<td class="num">' + D.fmtDuration(v.DurationS) + '</td>' +
        '<td class="num">' + D.fmtBytes(v.ActualSizeBytes) + '</td>' +
        '<td>' + D.escapeHtml(D.fmtDateTime(v.CreatedAt)) + '</td>' +
        '</tr>';
    }).join("");
    document.getElementById("rows").innerHTML = rows || '<tr><td colspan="7" class="note">Nenhum vídeo encontrado.</td></tr>';
  }

  function renderPager() {
    var from = state.total === 0 ? 0 : state.offset + 1;
    var to = Math.min(state.offset + state.limit, state.total);
    document.getElementById("pageInfo").textContent = from + "–" + to + " de " + state.total;
    document.getElementById("prev").disabled = state.offset <= 0;
    document.getElementById("next").disabled = state.offset + state.limit >= state.total;
  }

  // Atualiza a barra de endereço sem recarregar — mantém a listagem linkável.
  function pushURL() {
    var q = buildQuery();
    history.replaceState(null, "", "/dashboard/videos?" + q);
  }

  async function load() {
    hideError();
    try {
      pushURL();
      var data = await D.apiFetch("/admin/videos?" + buildQuery());
      state.total = (data && data.total) || 0;
      renderRows((data && data.videos) || []);
      renderPager();
      document.getElementById("content").classList.remove("hidden");
    } catch (e) {
      showError(e.message || "Falha ao listar vídeos.");
    }
  }

  document.getElementById("apply").addEventListener("click", function () { readControls(); load(); });
  document.getElementById("prev").addEventListener("click", function () {
    state.offset = Math.max(0, state.offset - state.limit); load();
  });
  document.getElementById("next").addEventListener("click", function () {
    state.offset = state.offset + state.limit; load();
  });

  syncControls();
  D.setupToken(load);
})();
</script>
</body>
</html>
