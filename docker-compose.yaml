# Compose padrão (desenvolvimento) — servidor Go com hot reload (Air).
#
# Uso:
#   docker compose up --build
#
# O código-fonte Go (cmd/, internal/) é montado no container. Qualquer
# alteração dispara rebuild e restart automático do servidor.
# Nada precisa estar instalado no host além do Docker.
#
# O frontend Vue (web/) é compilado uma vez durante o build da imagem.
# Para desenvolver o frontend com HMR, rode o Vite separadamente no host.

services:
  streamedia:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    environment:
      - ENV=development
      - ROOT_TOKEN=${ROOT_TOKEN}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SQLITE_PATH=/data/media.db
      - PORT=3000
      - SPA_DIR=/app/web/dist
    volumes:
      # Código-fonte Go — montado para hot reload
      - ./cmd:/src/cmd
      - ./internal:/src/internal
      - ./go.mod:/src/go.mod
      - ./go.sum:/src/go.sum
      - ./VERSION:/src/VERSION
      - ./.air.toml:/src/.air.toml
      # Dados persistentes no diretório do projeto
      - ./data:/data
      - ./media:/media
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
