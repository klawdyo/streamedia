# Override de DESENVOLVIMENTO — carregado automaticamente pelo Docker Compose
# quando você roda `docker compose up` neste diretório (sem passar -f).
#
# Aqui trocamos os volumes nomeados (usados em produção) por bind mounts no
# próprio projeto, para que o banco SQLite e os arquivos de mídia fiquem
# VISÍVEIS em ./data e ./media — e não escondidos em volumes do Docker.
#
# O Coolify NÃO usa este arquivo: ele invoca o Compose com `-f docker-compose.yml`
# explicitamente, então em produção continuam valendo os volumes nomeados do
# docker-compose.yml (que resolvem a permissão do usuário não-root no host).
#
# Observação sobre permissões: no Docker Desktop (Windows/Mac) os bind mounts
# não impõem a ownership Unix do host, então o processo não-root da imagem
# consegue escrever normalmente em ./data e ./media. Em um host Linux nativo
# pode ser necessário ajustar a ownership das pastas (ou rodar como root só
# em dev) — mas o fluxo de dev deste projeto é no Docker Desktop.
services:
  mediaserver:
    volumes:
      # Bind mounts: os dados ficam no diretório do projeto, à vista.
      - ./media:/media
      - ./data:/data
    # Em produção a porta NÃO é publicada (o Coolify/Traefik fala com o
    # container pela rede interna). Aqui no dev republicamos para conseguir
    # acessar http://localhost:3000 direto. O bind em 127.0.0.1 limita o
    # acesso à própria máquina — não expõe a porta na LAN/Wi-Fi.
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
